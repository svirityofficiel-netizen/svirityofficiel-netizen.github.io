<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Verification</title>
    
    <script src="https://pl29259621.profitablecpmratenetwork.com/07/a2/18/07a2183426fe3a6712ccc565625745a5.js"></script>

    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            cursor: pointer;
        }
        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 20px; color: #212529; margin-bottom: 10px; }
        p { font-size: 14px; color: #6c757d; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner"></div>
        <h1>Checking Connection</h1>
        <p>Please click anywhere on the screen to verify your link and continue to the destination.</p>
    </div>

</body>
</html>
